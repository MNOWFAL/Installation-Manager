<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Installation - DS Installation Manager</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .logo {
            height: 50px;
            width: auto;
            object-fit: contain;
        }
        
        h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .nav-links {
            position: absolute;
            right: 0;
            display: flex;
            gap: 10px;
        }
        
        .nav-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-size: 0.9rem;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .nav-link.active {
            background: white;
            color: #667eea;
        }
        
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .form-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-header h2 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .form-header p {
            color: #666;
            font-size: 0.95rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        label span {
            color: #f44336;
        }
        
        input, select, textarea {
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
            animation: slideIn 0.5s ease;
        }
        
        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #f44336;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .recent-entries {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .recent-entries h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        
        .entry-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        
        .entry-info {
            flex: 1;
        }
        
        .entry-client {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .entry-meta {
            font-size: 0.85rem;
            color: #666;
        }
        
        .entry-date {
            color: #667eea;
            font-weight: 600;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-links {
                position: static;
                width: 100%;
                justify-content: center;
            }
            
            .logo {
                height: 40px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo-container">
                <img src="logo.png" alt="DS Installation Manager Logo" class="logo" onerror="this.style.display='none'">
                <h1>DS Installation Manager</h1>
            </div>
            <div class="nav-links">
                <a href="add.html" class="nav-link active">Add New</a>
                <a href="view.html" class="nav-link">View All</a>
            </div>
        </div>
        
        <div class="form-container">
            <div class="success-message" id="successMessage">
                ✅ Installation added successfully! 
                <a href="view.html" style="color: #155724; text-decoration: underline; font-weight: 600;">View all installations</a>
            </div>
            
            <div class="error-message" id="errorMessage">
                ❌ Error adding installation. Please try again.
            </div>
            
            <div class="form-header">
                <h2>Add New Installation</h2>
                <p>Enter the details for the new installation job</p>
            </div>
            
            <form id="installationForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="client">Client Name <span>*</span></label>
                        <input type="text" id="client" placeholder="e.g., ABC Corporation" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="pic">PIC (Person In Charge) <span>*</span></label>
                        <input type="text" id="pic" placeholder="e.g., John Smith" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="requestedDate">Requested Date <span>*</span></label>
                        <input type="date" id="requestedDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="installationDate">Installation Date</label>
                        <input type="date" id="installationDate">
                    </div>
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="details">Installation Details <span>*</span></label>
                        <textarea id="details" placeholder="Describe the installation work required..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Location <span>*</span></label>
                        <input type="text" id="location" placeholder="e.g., Building A, Floor 3" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="Pending">Pending</option>
                            <option value="Scheduled">Scheduled</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="submitBtn">Add Installation</button>
            </form>
            
            <div class="recent-entries" id="recentEntries" style="display: none;">
                <h3>Recently Added</h3>
                <div id="recentList"></div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDsW-6OfPDtbFal42zckbQVszcQm3QSXuY",
            authDomain: "installationmanager-b5b26.firebaseapp.com",
            projectId: "installationmanager-b5b26",
            storageBucket: "installationmanager-b5b26.firebasestorage.app",
            messagingSenderId: "692371087249",
            appId: "1:692371087249:web:120507fc2ac50506f90430"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Set today's date as default for requested date
        document.getElementById('requestedDate').valueAsDate = new Date();

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            // Handle Firestore timestamp
            if (dateStr.toDate) {
                dateStr = dateStr.toDate();
            }
            const date = new Date(dateStr);
            const day = String(date.getDate()).padStart(2, '0');
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const month = monthNames[date.getMonth()];
            const year = date.getFullYear();
            return `${day} ${month} ${year}`;
        }

        async function loadRecentEntries() {
            try {
                const snapshot = await db.collection('installations')
                    .orderBy('createdAt', 'desc')
                    .limit(3)
                    .get();
                
                const recentContainer = document.getElementById('recentEntries');
                const recentList = document.getElementById('recentList');
                
                if (!snapshot.empty) {
                    recentContainer.style.display = 'block';
                    recentList.innerHTML = '';
                    
                    snapshot.forEach(doc => {
                        const inst = doc.data();
                        const entryCard = document.createElement('div');
                        entryCard.className = 'entry-card';
                        entryCard.innerHTML = `
                            <div class="entry-info">
                                <div class="entry-client">${escapeHtml(inst.client)}</div>
                                <div class="entry-meta">PIC: ${escapeHtml(inst.pic || 'N/A')} | Inst: ${formatDate(inst.installationDate)}</div>
                            </div>
                            <div class="entry-date">${formatDate(inst.requestedDate)}</div>
                        `;
                        recentList.appendChild(entryCard);
                    });
                } else {
                    recentContainer.style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading recent entries:', error);
            }
        }

        function escapeHtml(text) {
            if (!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('installationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Adding...';
            
            const installation = {
                client: document.getElementById('client').value,
                pic: document.getElementById('pic').value,
                requestedDate: document.getElementById('requestedDate').value,
                installationDate: document.getElementById('installationDate').value || null,
                details: document.getElementById('details').value,
                location: document.getElementById('location').value,
                status: document.getElementById('status').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                await db.collection('installations').add(installation);
                
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                document.getElementById('installationForm').reset();
                document.getElementById('requestedDate').valueAsDate = new Date();
                
                loadRecentEntries();
                
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error('Error adding installation:', error);
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });

        // Load recent entries on page load
        loadRecentEntries();
    </script>
</body>
</html>
