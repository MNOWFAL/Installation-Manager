<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Installation - Installation Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
        }
        
        .nav-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .nav-link.active {
            background: white;
            color: #667eea;
        }
        
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .form-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-header h2 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .form-header p {
            color: #666;
            font-size: 0.95rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        label span {
            color: #f44336;
        }
        
        input, select, textarea {
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            font-size: 1.1rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .recent-entries {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .recent-entries h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        
        .entry-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .entry-info {
            flex: 1;
        }
        
        .entry-client {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .entry-meta {
            font-size: 0.85rem;
            color: #666;
        }
        
        .entry-date {
            color: #667eea;
            font-weight: 600;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4CAF50;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 600px) {
            .form-container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .nav-links {
                width: 100%;
            }
            
            .nav-link {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <h1>🔧 Installation Manager</h1>
            <div class="nav-links">
                <a href="add.html" class="nav-link active">Add New</a>
                <a href="index.html" class="nav-link">View All</a>
            </div>
        </div>
        
        <div class="form-container">
            <div class="success-message" id="successMessage">
                ✅ Installation added successfully! 
                <a href="index.html" style="color: #155724; text-decoration: underline; font-weight: 600;">View all installations</a>
            </div>
            
            <div class="form-header">
                <h2>Add New Installation</h2>
                <p>Enter the details for the new installation job</p>
            </div>
            
            <form id="installationForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="client">Client Name <span>*</span></label>
                        <input type="text" id="client" placeholder="e.g., ABC Corporation" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Installation Date</label>
                        <input type="date" id="date">
                    </div>
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="details">Installation Details <span>*</span></label>
                        <textarea id="details" placeholder="Describe the installation work required..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Location <span>*</span></label>
                        <input type="text" id="location" placeholder="e.g., Building A, Floor 3" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="Pending">Pending</option>
                            <option value="Scheduled">Scheduled</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Installation</button>
                <button type="button" class="btn btn-secondary" onclick="viewAll()">View All Installations</button>
            </form>
            
            <div class="recent-entries" id="recentEntries" style="display: none;">
                <h3>Recently Added <span class="live-indicator"><span class="live-dot"></span>LIVE</span></h3>
                <div id="recentList"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG FROM STEP 1
        const firebaseConfig = {
              apiKey: "AIzaSyDsW-6OfPDtbFal42zckbQVszcQm3QSXuY",
              authDomain: "installationmanager-b5b26.firebaseapp.com",
              projectId: "installationmanager-b5b26",
              storageBucket: "installationmanager-b5b26.firebasestorage.app",
              messagingSenderId: "692371087249",
              appId: "1:692371087249:web:120507fc2ac50506f90430"
        };


        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const installationsRef = collection(db, "installations");

        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();

        // Real-time listener for recent entries
        const recentQuery = query(installationsRef, orderBy("createdAt", "desc"), limit(5));
        onSnapshot(recentQuery, (snapshot) => {
            const recentContainer = document.getElementById('recentEntries');
            const recentList = document.getElementById('recentList');
            
            if (!snapshot.empty) {
                recentContainer.style.display = 'block';
                const entries = [];
                snapshot.forEach((doc) => {
                    entries.push({ id: doc.id, ...doc.data() });
                });
                
                recentList.innerHTML = entries.map(inst => `
                    <div class="entry-card">
                        <div class="entry-info">
                            <div class="entry-client">${escapeHtml(inst.client)}</div>
                            <div class="entry-meta">${escapeHtml(inst.details.substring(0, 50))}${inst.details.length > 50 ? '...' : ''}</div>
                        </div>
                        <div class="entry-date">${formatDate(inst.date)}</div>
                    </div>
                `).join('');
            } else {
                recentContainer.style.display = 'none';
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateStr).toLocaleDateString('en-US', options);
        }

        document.getElementById('installationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const installation = {
                client: document.getElementById('client').value,
                details: document.getElementById('details').value,
                location: document.getElementById('location').value,
                date: document.getElementById('date').value,
                status: document.getElementById('status').value,
                createdAt: new Date().toISOString()
            };
            
            try {
                await addDoc(installationsRef, installation);
                
                // Show success message
                document.getElementById('successMessage').style.display = 'block';
                
                // Reset form
                document.getElementById('installationForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                
                // Hide success message after 3 seconds
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            } catch (error) {
                alert('Error adding installation: ' + error.message);
            }
        });

        window.viewAll = function() {
            window.location.href = 'index.html';
        };
    </script>
</body>

</html>
