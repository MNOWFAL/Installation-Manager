<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Installations - Installation Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
        }
        
        .nav-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .nav-link.active {
            background: white;
            color: #667eea;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 150px;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 5px;
        }
        
        .controls-container {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .filter-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-group label {
            font-weight: 600;
            color: #333;
        }
        
        .filter-group select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            min-width: 150px;
        }
        
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .btn-danger:hover {
            background: #d32f2f;
        }
        
        .btn-success {
            background: #4CAF50;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        
        .btn-success:hover {
            background: #45a049;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 18px 20px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .client-cell {
            font-weight: 600;
            color: #333;
        }
        
        .details-cell {
            max-width: 300px;
            line-height: 1.5;
        }
        
        .location-cell {
            color: #666;
        }
        
        .date-cell {
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-scheduled {
            background: #d4edda;
            color: #155724;
        }
        
        .status-completed {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .date-overdue {
            color: #f44336;
        }
        
        .date-upcoming {
            color: #ff9800;
        }
        
        .date-future {
            color: #4CAF50;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 25px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            color: #666;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }
        
        .empty-state p {
            margin-bottom: 25px;
            font-size: 1rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .modal-header h3 {
            color: #333;
            font-size: 1.4rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        
        .modal-footer .btn {
            flex: 1;
        }
        
        .search-box {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            min-width: 200px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #667eea;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .controls-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                flex-direction: column;
                width: 100%;
            }
            
            .filter-group select {
                width: 100%;
            }
            
            th, td {
                padding: 12px;
                font-size: 0.9rem;
            }
            
            .details-cell {
                max-width: 150px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .stat-card {
                padding: 15px 25px;
                min-width: 120px;
            }
            
            .stat-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <h1>🔧 Installation Manager</h1>
            <div class="nav-links">
                <a href="add.html" class="nav-link">Add New</a>
                <a href="index.html" class="nav-link active">View All</a>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="scheduledCount">0</div>
                <div class="stat-label">Scheduled</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
        
        <div class="controls-container">
            <div class="filter-group">
                <label>Filter:</label>
                <select id="filterStatus" onchange="renderTable()">
                    <option value="All">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Scheduled">Scheduled</option>
                    <option value="Completed">Completed</option>
                </select>
                <input type="text" class="search-box" id="searchBox" placeholder="Search client..." onkeyup="renderTable()">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
                <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Details</th>
                        <th>Location</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" class="loading">
                            <div class="spinner"></div>
                            Loading data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Installation</h3>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Client Name</label>
                    <input type="text" id="editClient" required>
                </div>
                <div class="form-group">
                    <label>Details</label>
                    <textarea id="editDetails" required></textarea>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="editLocation" required>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="editDate" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus">
                        <option value="Pending">Pending</option>
                        <option value="Scheduled">Scheduled</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG FROM STEP 1
        const firebaseConfig = {
  apiKey: "AIzaSyDsW-6OfPDtbFal42zckbQVszcQm3QSXuY",
  authDomain: "installationmanager-b5b26.firebaseapp.com",
  projectId: "installationmanager-b5b26",
  storageBucket: "installationmanager-b5b26.firebasestorage.app",
  messagingSenderId: "692371087249",
  appId: "1:692371087249:web:120507fc2ac50506f90430"
};


        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const installationsRef = collection(db, "installations");
        
        let allInstallations = [];
        let editingId = null;

        // Real-time listener
        const q = query(installationsRef, orderBy("date", "asc"));
        onSnapshot(q, (snapshot) => {
            allInstallations = [];
            snapshot.forEach((doc) => {
                allInstallations.push({ id: doc.id, ...doc.data() });
            });
            updateStats();
            renderTable();
        });

        function updateStats() {
            document.getElementById('totalCount').textContent = allInstallations.length;
            document.getElementById('pendingCount').textContent = allInstallations.filter(i => i.status === 'Pending').length;
            document.getElementById('scheduledCount').textContent = allInstallations.filter(i => i.status === 'Scheduled').length;
            document.getElementById('completedCount').textContent = allInstallations.filter(i => i.status === 'Completed').length;
        }

        function getDateClass(dateStr) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const date = new Date(dateStr);
            const diffTime = date - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return 'date-overdue';
            if (diffDays <= 3) return 'date-upcoming';
            return 'date-future';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateStr).toLocaleDateString('en-US', options);
        }

        window.renderTable = function() {
            let installations = [...allInstallations];
            const filter = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchBox').value.toLowerCase();
            
            if (filter !== 'All') {
                installations = installations.filter(i => i.status === filter);
            }
            
            if (search) {
                installations = installations.filter(i => 
                    i.client.toLowerCase().includes(search) ||
                    i.details.toLowerCase().includes(search) ||
                    i.location.toLowerCase().includes(search)
                );
            }
            
            const tbody = document.getElementById('tableBody');
            
            if (installations.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                            <h3>No Installations Found</h3>
                            <p>${filter !== 'All' || search ? 'Try adjusting your filters.' : 'Start by adding your first installation.'}</p>
                            ${!search && filter === 'All' ? '<a href="add.html" class="btn btn-primary">Add Installation</a>' : ''}
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = installations.map(inst => `
                <tr>
                    <td class="client-cell">${escapeHtml(inst.client)}</td>
                    <td class="details-cell">${escapeHtml(inst.details)}</td>
                    <td class="location-cell">${escapeHtml(inst.location)}</td>
                    <td class="date-cell ${getDateClass(inst.date)}">${formatDate(inst.date)}</td>
                    <td><span class="status-badge status-${inst.status.toLowerCase()}">${inst.status}</span></td>
                    <td class="actions">
                        <button class="btn btn-success" onclick="editInstallation('${inst.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteInstallation('${inst.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        };

        window.editInstallation = function(id) {
            const inst = allInstallations.find(i => i.id === id);
            if (!inst) return;
            
            editingId = id;
            document.getElementById('editId').value = id;
            document.getElementById('editClient').value = inst.client;
            document.getElementById('editDetails').value = inst.details;
            document.getElementById('editLocation').value = inst.location;
            document.getElementById('editDate').value = inst.date;
            document.getElementById('editStatus').value = inst.status;
            
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeModal = function() {
            document.getElementById('editModal').style.display = 'none';
            editingId = null;
        };

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const docRef = doc(db, "installations", editingId);
            await updateDoc(docRef, {
                client: document.getElementById('editClient').value,
                details: document.getElementById('editDetails').value,
                location: document.getElementById('editLocation').value,
                date: document.getElementById('editDate').value,
                status: document.getElementById('editStatus').value,
                updatedAt: new Date().toISOString()
            });
            
            closeModal();
        });

        window.deleteInstallation = async function(id) {
            if (confirm('Are you sure you want to delete this installation?')) {
                await deleteDoc(doc(db, "installations", id));
            }
        };

        window.clearAll = async function() {
            if (confirm('WARNING: This will delete ALL installations. Are you sure?')) {
                const batch = writeBatch(db);
                allInstallations.forEach((inst) => {
                    batch.delete(doc(db, "installations", inst.id));
                });
                await batch.commit();
            }
        };

        window.exportCSV = function() {
            if (allInstallations.length === 0) {
                alert('No data to export');
                return;
            }
            
            const csv = [
                ['Client', 'Details', 'Location', 'Date', 'Status'],
                ...allInstallations.map(i => [i.client, i.details, i.location, i.date, i.status])
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `installations_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        };

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
